<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <style>
    text { font-family: "JetBrains Mono", "Fira Code", "DejaVu Sans Mono", monospace; }
    .title { font: 700 42px "Inter", "DejaVu Sans", sans-serif; }
    .meta { font: 20px "Inter", "DejaVu Sans", sans-serif; }
    .term { font-size: 24px; }
    .label { font-size: 16px; font-weight: 700; }
  </style>
  <rect width="1100" height="620" fill="#f2e5bc"/>
  <text x="60" y="78" class="title" fill="#3c3836">Light Day: Gruvbox Light</text>
  <text x="60" y="118" class="meta" fill="#665c54">Readable in daylight, warm paper background, high-contrast selection.</text>
  <rect x="60" y="170" width="980" height="230" rx="14" fill="#fbf1c7" stroke="#d5c4a1"/>
  <text x="98" y="225" class="term" fill="#79740e">$ codex resume --last</text>
  <text x="98" y="268" class="term" fill="#3c3836">typing remains dark and readable on light background</text>
  <text x="98" y="311" class="term" fill="#076678">wezterm + zellij: gruvbox-light</text>
  <rect x="98" y="335" width="430" height="32" fill="#fabd2f"/>
  <text x="98" y="360" class="term" fill="#1d2021">selected text stays visible</text>
  <g transform="translate(60 455)">
    <rect width="90" height="70" rx="10" fill="#fbf1c7" stroke="#d5c4a1"/>
    <rect x="115" width="90" height="70" rx="10" fill="#3c3836"/>
    <rect x="230" width="90" height="70" rx="10" fill="#076678"/>
    <rect x="345" width="90" height="70" rx="10" fill="#79740e"/>
    <rect x="460" width="90" height="70" rx="10" fill="#b57614"/>
    <rect x="575" width="90" height="70" rx="10" fill="#9d0006"/>
    <text x="0" y="105" class="label" fill="#3c3836">bg</text>
    <text x="115" y="105" class="label" fill="#3c3836">fg</text>
    <text x="230" y="105" class="label" fill="#3c3836">blue</text>
    <text x="345" y="105" class="label" fill="#3c3836">green</text>
    <text x="460" y="105" class="label" fill="#3c3836">yellow</text>
    <text x="575" y="105" class="label" fill="#3c3836">red</text>
  </g>
</svg>
