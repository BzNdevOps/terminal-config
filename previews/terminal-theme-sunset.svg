<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <style>
    text { font-family: "JetBrains Mono", "Fira Code", "DejaVu Sans Mono", monospace; }
    .title { font: 700 42px "Inter", "DejaVu Sans", sans-serif; }
    .meta { font: 20px "Inter", "DejaVu Sans", sans-serif; }
    .term { font-size: 24px; }
    .label { font-size: 16px; font-weight: 700; }
  </style>
  <rect width="1100" height="620" fill="#3c3836"/>
  <text x="60" y="78" class="title" fill="#fabd2f">Sunset: Gruvbox Warm</text>
  <text x="60" y="118" class="meta" fill="#d5c4a1">Warm amber/orange, less blue, comfortable for evening work.</text>
  <rect x="60" y="170" width="980" height="230" rx="14" fill="#282828" stroke="#665c54"/>
  <text x="98" y="225" class="term" fill="#b8bb26">$ git status --short</text>
  <text x="98" y="268" class="term" fill="#ebdbb2">M  config/wezterm/wezterm.lua</text>
  <text x="98" y="311" class="term" fill="#fe8019">zellij: gruvbox-dark / custom warm</text>
  <rect x="98" y="335" width="430" height="32" fill="#fabd2f"/>
  <text x="98" y="360" class="term" fill="#1d2021">selected text stays visible</text>
  <g transform="translate(60 455)">
    <rect width="90" height="70" rx="10" fill="#282828" stroke="#665c54"/>
    <rect x="115" width="90" height="70" rx="10" fill="#ebdbb2"/>
    <rect x="230" width="90" height="70" rx="10" fill="#d79921"/>
    <rect x="345" width="90" height="70" rx="10" fill="#b8bb26"/>
    <rect x="460" width="90" height="70" rx="10" fill="#fe8019"/>
    <rect x="575" width="90" height="70" rx="10" fill="#fb4934"/>
    <text x="0" y="105" class="label" fill="#ebdbb2">bg</text>
    <text x="115" y="105" class="label" fill="#ebdbb2">fg</text>
    <text x="230" y="105" class="label" fill="#ebdbb2">amber</text>
    <text x="345" y="105" class="label" fill="#ebdbb2">green</text>
    <text x="460" y="105" class="label" fill="#ebdbb2">orange</text>
    <text x="575" y="105" class="label" fill="#ebdbb2">red</text>
  </g>
</svg>
