<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <style>
    text { font-family: "JetBrains Mono", "Fira Code", "DejaVu Sans Mono", monospace; }
    .title { font: 700 42px "Inter", "DejaVu Sans", sans-serif; }
    .meta { font: 20px "Inter", "DejaVu Sans", sans-serif; }
    .term { font-size: 24px; }
    .label { font-size: 16px; font-weight: 700; }
  </style>
  <rect width="1100" height="620" fill="#11111b"/>
  <text x="60" y="78" class="title" fill="#cdd6f4">Night: Catppuccin Mocha</text>
  <text x="60" y="118" class="meta" fill="#a6adc8">Soft dark, low glare, strong community support for WezTerm/Zellij setups.</text>
  <rect x="60" y="170" width="980" height="230" rx="14" fill="#1e1e2e" stroke="#45475a"/>
  <text x="98" y="225" class="term" fill="#a6e3a1">$ zellij attach ai</text>
  <text x="98" y="268" class="term" fill="#cdd6f4">codex: inspect config, run tests, prepare patch</text>
  <text x="98" y="311" class="term" fill="#89b4fa">wezterm: Catppuccin Mocha</text>
  <rect x="98" y="335" width="430" height="32" fill="#45475a"/>
  <text x="98" y="360" class="term" fill="#f5e0dc">selected text stays visible</text>
  <g transform="translate(60 455)">
    <rect width="90" height="70" rx="10" fill="#1e1e2e" stroke="#585b70"/>
    <rect x="115" width="90" height="70" rx="10" fill="#cdd6f4"/>
    <rect x="230" width="90" height="70" rx="10" fill="#89b4fa"/>
    <rect x="345" width="90" height="70" rx="10" fill="#a6e3a1"/>
    <rect x="460" width="90" height="70" rx="10" fill="#f9e2af"/>
    <rect x="575" width="90" height="70" rx="10" fill="#f38ba8"/>
    <text x="0" y="105" class="label" fill="#cdd6f4">bg</text>
    <text x="115" y="105" class="label" fill="#cdd6f4">fg</text>
    <text x="230" y="105" class="label" fill="#cdd6f4">blue</text>
    <text x="345" y="105" class="label" fill="#cdd6f4">green</text>
    <text x="460" y="105" class="label" fill="#cdd6f4">yellow</text>
    <text x="575" y="105" class="label" fill="#cdd6f4">red</text>
  </g>
</svg>
