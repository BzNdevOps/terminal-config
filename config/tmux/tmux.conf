set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g set-clipboard on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-Up copy-mode -u
bind -n M-PageUp copy-mode -u

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
set -g status-left-length 40
set -g status-right-length 100
set -g status-style "bg=colour234,fg=colour252"
set -g status-left "#[fg=colour214,bold]#S #[fg=colour244]| #[fg=colour252]#(whoami)@#H"
set -g status-right "#[fg=colour244]%Y-%m-%d #[fg=colour252]%H:%M "
setw -g window-status-current-format "#[fg=colour234,bg=colour214,bold] #I:#W "
setw -g window-status-format "#[fg=colour252,bg=colour237] #I:#W "
